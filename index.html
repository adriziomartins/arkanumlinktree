:root{--gold:#c8a84e;--gold-light:#e8d48b;--gold-dark:#8a6d2b;--bg:#0a0a0a;--card:rgba(18,16,12,.85);--white:#f0ece4}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:var(--bg);font-family:'Poppins',sans-serif;color:var(--white);display:flex;justify-content:center;overflow-x:hidden}

/* ===== BACKGROUND ===== */
.bg-layer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0}
.orb-1{width:400px;height:400px;top:-10%;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(200,168,78,.18),transparent 70%);animation:orbFloat1 5s ease-in-out infinite}
.orb-2{width:300px;height:300px;bottom:5%;left:20%;background:radial-gradient(circle,rgba(200,168,78,.12),transparent 70%);animation:orbFloat2 7s ease-in-out infinite 1s}
.orb-3{width:250px;height:250px;top:40%;right:-5%;background:radial-gradient(circle,rgba(200,168,78,.1),transparent 70%);animation:orbFloat3 6s ease-in-out infinite 2s}
.orb-4{width:350px;height:350px;top:25%;left:-10%;background:radial-gradient(circle,rgba(180,140,50,.08),transparent 70%);animation:orbFloat4 8s ease-in-out infinite .5s}
.orb-5{width:200px;height:200px;bottom:25%;right:10%;background:radial-gradient(circle,rgba(200,168,78,.1),transparent 70%);animation:orbFloat5 5.5s ease-in-out infinite 3s}
@keyframes orbFloat1{0%,100%{opacity:.4;transform:translateX(-50%) scale(1) translateY(0)}50%{opacity:.9;transform:translateX(-50%) scale(1.3) translateY(20px)}}
@keyframes orbFloat2{0%,100%{opacity:.3;transform:scale(1) translate(0,0)}50%{opacity:.7;transform:scale(1.2) translate(30px,-20px)}}
@keyframes orbFloat3{0%,100%{opacity:.2;transform:scale(1) translate(0,0)}50%{opacity:.6;transform:scale(1.15) translate(-20px,30px)}}
@keyframes orbFloat4{0%,100%{opacity:.15;transform:scale(1) translate(0,0)}50%{opacity:.5;transform:scale(1.25) translate(15px,15px)}}
@keyframes orbFloat5{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.65;transform:scale(1.3)}}

/* Particles */
.particle{position:fixed;background:var(--gold);border-radius:50%;pointer-events:none;z-index:1;opacity:0;animation:float linear infinite}
.p1{width:3px;height:3px;left:8%;animation-duration:9s;animation-delay:0s}
.p2{width:2px;height:2px;left:22%;animation-duration:12s;animation-delay:1.5s}
.p3{width:3px;height:3px;left:38%;animation-duration:10s;animation-delay:3s}
.p4{width:2px;height:2px;left:55%;animation-duration:11s;animation-delay:.5s}
.p5{width:4px;height:4px;left:70%;animation-duration:8s;animation-delay:2s;box-shadow:0 0 6px rgba(200,168,78,.5)}
.p6{width:2px;height:2px;left:85%;animation-duration:13s;animation-delay:4s}
.p7{width:3px;height:3px;left:15%;animation-duration:10s;animation-delay:5s}
.p8{width:2px;height:2px;left:48%;animation-duration:14s;animation-delay:2.5s}
.p9{width:3px;height:3px;left:78%;animation-duration:9s;animation-delay:6s;box-shadow:0 0 6px rgba(200,168,78,.4)}
.p10{width:2px;height:2px;left:92%;animation-duration:11s;animation-delay:1s}
.p11{width:4px;height:4px;left:33%;animation-duration:8s;animation-delay:3.5s;box-shadow:0 0 8px rgba(200,168,78,.6)}
.p12{width:2px;height:2px;left:62%;animation-duration:12s;animation-delay:7s}
@keyframes float{0%{opacity:0;transform:translateY(100vh) scale(.5)}10%{opacity:.7}90%{opacity:.6}100%{opacity:0;transform:translateY(-10vh) scale(1.2)}}

.grain{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E")}
.vignette{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.5) 100%)}

/* ===== CONTENT ===== */
.container{position:relative;z-index:2;width:100%;max-width:440px;padding:50px 24px 60px;display:flex;flex-direction:column;align-items:center;gap:28px}
.logo-section{display:flex;flex-direction:column;align-items:center;gap:16px;animation:fadeUp .8s ease-out both}
.logo-img{width:120px;height:120px;border-radius:50%;border:2px solid rgba(200,168,78,.4);box-shadow:0 0 40px rgba(200,168,78,.2),0 0 80px rgba(200,168,78,.08);object-fit:cover;animation:logoPulse 4s ease-in-out infinite}
@keyframes logoPulse{0%,100%{box-shadow:0 0 40px rgba(200,168,78,.2),0 0 80px rgba(200,168,78,.08)}50%{box-shadow:0 0 50px rgba(200,168,78,.3),0 0 100px rgba(200,168,78,.12)}}
.logo-name{font-family:'Cinzel',serif;font-size:30px;font-weight:700;letter-spacing:10px;text-transform:uppercase;color:var(--white);text-shadow:0 0 30px rgba(200,168,78,.2)}
.logo-tagline{font-size:11px;font-weight:300;letter-spacing:5px;text-transform:uppercase;color:var(--gold);opacity:.7;margin-top:-6px}
.divider{width:80%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;animation:fadeUp .8s ease-out .1s both}
.section-label{font-size:10px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--gold);opacity:.5;align-self:flex-start;margin-left:8px;margin-bottom:-14px;animation:fadeUp .6s ease-out .15s both}
.links{display:flex;flex-direction:column;gap:12px;width:100%}
a.link-btn,a.link-btn:visited,a.link-btn:link,a.link-btn:active{display:flex;align-items:center;gap:16px;width:100%;padding:14px 22px;background:var(--card);border:1px solid rgba(200,168,78,.18);border-radius:14px;text-decoration:none;color:var(--white);transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);cursor:pointer;animation:fadeUp .6s ease-out both}
.link-title,.link-sub{color:inherit}
a.link-btn .link-title{color:#f0ece4!important}
a.link-btn .link-sub{color:rgba(240,236,228,.45)!important}
.link-btn:nth-child(1){animation-delay:.2s}.link-btn:nth-child(2){animation-delay:.3s}
.link-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(200,168,78,.1) 0%,transparent 50%);opacity:0;transition:opacity .35s}
.link-btn:hover{border-color:rgba(200,168,78,.5);transform:translateY(-3px);box-shadow:0 10px 40px rgba(200,168,78,.15)}
.link-btn:hover::before{opacity:1}.link-btn:active{transform:translateY(0)}
.link-icon{width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1;overflow:hidden}
.link-icon.product{background:transparent;padding:2px}
.link-icon.product img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
.link-icon.tiktok{background:linear-gradient(135deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,.1)}
.link-icon.instagram{background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);box-shadow:0 2px 12px rgba(253,29,29,.2)}
.link-text{display:flex;flex-direction:column;gap:2px;position:relative;z-index:1}
.link-title{font-size:15px;font-weight:600;color:var(--white)}
.link-sub{font-size:11px;font-weight:300;color:rgba(240,236,228,.45);letter-spacing:.3px}
.link-arrow{margin-left:auto;color:var(--gold);opacity:.3;transition:all .35s;font-size:20px;position:relative;z-index:1;font-weight:300}
.link-btn:hover .link-arrow{opacity:.8;transform:translateX(3px)}
.footer{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:8px;animation:fadeUp .6s ease-out .6s both}
.footer-divider{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.25}
.footer-text{font-family:'Cinzel',serif;font-size:10px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:rgba(200,168,78,.3)}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
